<!-- REPORT START -->
<div id="reportPrintArea" class="container-fluid p-4 bg-light">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="fw-bold m-0"> Reports</h3>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary" id="btnPrintReport">
        <i class="bi bi-printer"></i> Print
      </button>
    <button class="btn btn-outline-danger" id="btnExportPDF">
      <i class="bi bi-file-earmark-pdf"></i> Export PDF
    </button>

    </div>
  </div>

  <!-- Filters Card -->
  <div class="card shadow-sm border-0 mb-3">
    <div class="card-body">
      <div class="row g-2 align-items-end">

        <div class="col-md-3">
          <label class="form-label">Report Type</label>
          <select class="form-select" id="reportType">
            <option value="ACTIVITY">Activity (Issued/Returned/Overdue)</option>
            <option value="OVERDUE">Overdue Only</option>
            <option value="FINE">Fine (Pending/Paid)</option>
            <option value="INVENTORY">Inventory (Books)</option>
            <option value="LEDGER">Student Ledger</option>
          </select>
        </div>

        <!-- Date range (for Activity + Fine) -->
        <div class="col-md-2 report-date">
          <label class="form-label">From</label>
          <input type="date" id="fromDate" class="form-control">
        </div>

        <div class="col-md-2 report-date">
          <label class="form-label">To</label>
          <input type="date" id="toDate" class="form-control">
        </div>

        <!-- Activity type -->
        <div class="col-md-2 report-activity-type">
          <label class="form-label">Type</label>
          <select class="form-select" id="activityType">
            <option value="ALL">ALL</option>
            <option value="ISSUED">ISSUED</option>
            <option value="RETURNED">RETURNED</option>
            <option value="OVERDUE">OVERDUE</option>
          </select>
        </div>

        <!-- Course -->
        <div class="col-md-2 report-course">
          <label class="form-label">Course</label>
          <select class="form-select" id="reportCourse">
            <option value="">ALL</option>
            <option value="BCA">BCA</option>
            <option value="BSC">BSC</option>
            <option value="BCOM">BCOM</option>
            <option value="BA">BA</option>
            <option value="MCA">MCA</option>
            <option value="MSC">MSC</option>
            <option value="MBA">MBA</option>
          </select>
        </div>

        <!-- RollNo -->
        <div class="col-md-2 report-roll">
          <label class="form-label">Roll No</label>
          <input type="number" id="reportRollNo" class="form-control" placeholder="e.g. 101">
        </div>

        <!-- Book ID -->
        <div class="col-md-2 report-book">
          <label class="form-label">Book ID</label>
          <input type="number" id="reportBookId" class="form-control" placeholder="e.g. 12">
        </div>

        <!-- Fine mode -->
        <div class="col-md-2 report-fine-mode">
          <label class="form-label">Fine Mode</label>
          <select class="form-select" id="fineMode">
            <option value="PENDING">PENDING</option>
            <option value="PAID">PAID</option>
          </select>
        </div>

        <!-- Overdue days buckets -->
        <div class="col-md-2 report-overdue-days">
          <label class="form-label">Overdue Days</label>
          <select class="form-select" id="overdueBucket">
            <option value="">ALL</option>
            <option value="1-7">1-7</option>
            <option value="8-15">8-15</option>
            <option value="16-30">16-30</option>
            <option value="31-9999">30+</option>
          </select>
        </div>

        <!-- Inventory filters -->
        <div class="col-md-2 report-inv-status">
          <label class="form-label">Book Status</label>
          <select class="form-select" id="invStatus">
            <option value="">ALL</option>
            <option value="AVAILABLE">AVAILABLE</option>
            <option value="NOT AVAILABLE">NOT AVAILABLE</option>
            <option value="ISSUED">ISSUED</option>
          </select>
        </div>

        <div class="col-md-2 report-inv-low">
          <label class="form-label">Low Stock</label>
          <select class="form-select" id="invLowStock">
            <option value="">ALL</option>
            <option value="1">Only Low Stock (<=2)</option>
          </select>
        </div>

        <!-- Ledger -->
        <div class="col-md-2 report-ledger-roll">
          <label class="form-label">Ledger RollNo</label>
          <input type="number" id="ledgerRollNo" class="form-control" placeholder="e.g. 101">
        </div>

        <div class="col-md-2">
          <button class="btn btn-primary w-100" id="btnGenerateReport">
            <i class="bi bi-bar-chart"></i> Generate
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- Table Card -->
  <div class="card shadow-sm border-0">
    <div class="card-header bg-white fw-bold d-flex justify-content-between align-items-center">
      <span id="reportTitle">Report Result</span>
      <span class="text-muted small" id="reportMeta"></span>
    </div>

    <div class="card-body p-0">
      <div>
        <table class="table table-hover mb-0">
          <thead class="table-light" id="reportThead"></thead>
          <tbody id="reportTbody">
            <tr><td class="text-center text-muted p-4">Generate a report...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
<!-- REPORT END -->
