<!-- DASHBOARD START -->
<div class="container-fluid p-4 bg-light">

  <!-- Page Title -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold"> Library Dashboard</h3>
    <span class="badge bg-success fs-6">Admin Panel</span>
  </div>

  <!-- STAT CARDS -->
  <div class="row g-4 mb-4">

    <div class="col-md-3">
      <div class="card shadow-sm border-0">
        <div class="card-body d-flex justify-content-between">
          <div>
            <h6>Total Books</h6>
            <h3 class="fw-bold" id="totalBooks">0</h3>
          </div>
          <i class="bi bi-book fs-1 text-primary"></i>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm border-0">
        <div class="card-body d-flex justify-content-between">
          <div>
            <h6>Issued Books</h6>
            <h3 class="fw-bold" id="issuedBooksCount">0</h3>
          </div>
          <i class="bi bi-journal-arrow-up fs-1 text-success"></i>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm border-0">
        <div class="card-body d-flex justify-content-between">
          <div>
            <h6>Registered Students</h6>
            <h3 class="fw-bold" id="totalStudents">0</h3>
          </div>
          <i class="bi bi-people fs-1 text-warning"></i>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm border-0">
        <div class="card-body d-flex justify-content-between">
          <div>
            <h6>Overdue Books</h6>
            <h3 class="fw-bold text-danger" id="overdueBooksCount">0</h3>
          </div>
          <i class="bi bi-exclamation-triangle fs-1 text-danger"></i>
        </div>
      </div>
    </div>

  </div>

  <!-- CONTENT ROW -->
  <div class="row">

    <!-- RECENT ISSUED BOOKS -->
    <div class="col-md-8">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-white fw-bold">
           Recent Issued Books
        </div>
        <div class="card-body table-responsive dashboard-activity-box">
          <table class="table table-hover  mb-0">
            <thead class="table-light">
              <tr>
                <th>Student</th>
                <th>Book</th>
                <th>Issue Date</th>
                <th>Due Date</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="recentIssuedTbody">
              <tr>
                <td colspan="5" class="text-center text-muted">Loading...</td>
              </tr>
            </tbody>

          </table>
        </div>
      </div>
    </div>

    <!-- QUICK ACTIONS (optional - keep as is) -->
    <div class="col-md-4">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-white fw-bold">
         Quick Actions
        </div>
        <div class="card-body d-grid gap-3">
          <!-- QUICK ACTIONS -->
          <button class="btn btn-primary" id="qaAddBook"> Add New Book</button>
          <button class="btn btn-success" id="qaIssueBook"> Issue Book</button>
          <button class="btn btn-warning" id="qaReturnBook"> Return Book</button>
          <button class="btn btn-danger" id="qaViewOverdue"> View Overdue</button>
        </div>
      </div>
    </div>

  </div>

</div>
<!-- DASHBOARD END -->
