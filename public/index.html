<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
  <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../src/style.css">
  <link rel="stylesheet" href="../src/index.js">
  <script src="../node_modules/jquery/dist/jquery.js"></script>
  <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script>
    let studentsCache = [];
    let filterWithBooks = false;
    let filterWithoutBooks = false;
    let filterOverdueBooks = false;

    $(function () {

      // ================= SIDEBAR NAV =================
      $("#btnDashboard").click(function () {
        $.ajax({ method: "GET", url: "dashboard.html" })
          .then(function (res) {
            $("#section").html(res);
            loadDashboardCounts();
            loadStudentCounts();
            loadTodayDashboardActivity();
          });
      });

      $("#btnBook").click(function () {
        $.ajax({ method: "GET", url: "book.html" })
          .then(function (res) {
            $("#section").html(res);
            fetchBooks();
          });
      });

      $("#btnStudent").click(function () {
        $.ajax({ method: "GET", url: "student.html" })
          .then(function (res) {
            $("#section").html(res);
            loadStudents();
            loadStudentCounts();
          });
      });

      $("#btnIssue").click(function () {
        $.ajax({ method: "GET", url: "issue.html" })
          .then(function (res) {
            $("#section").html(res);
            resetIssueUI();
            fetchBooks();
          });
      });

      $("#btnFine").click(function () {
        $.ajax({ method: "GET", url: "fine.html" })
          .then(function (res) {
            $("#section").html(res);
            loadFinePageData("PENDING"); //  default unpaid list
          });
      });

      $("#btnReport").click(function () {
        $.ajax({ method: "GET", url: "report.html" })
          .then(function (res) {
            $("#section").html(res);
            initReportPage();
          });
      });

      // Login 
      // ================= AUTH (COOKIE LOGIN) =================
      function cookieKeyFromUsername(username) {
        return "LIBRA_" + String(username || "")
          .trim()
          .toUpperCase()
          .replace(/\s+/g, "_");
      }

      function hasLibraLoginCookie() {
        return document.cookie
          .split(";")
          .map(x => x.trim())
          .some(c => c.startsWith("LIBRA_"));
      }

      function getLibraCookieName() {
        const c = document.cookie
          .split(";")
          .map(x => x.trim())
          .find(x => x.startsWith("LIBRA_"));
        return c ? c.split("=")[0] : null;
      }

      function setCookie(name, value) {
        // ✅ session cookie (no expires) => browser close pe delete
        document.cookie = `${name}=${encodeURIComponent(value)}; path=/`;
      }


      function getCookie(name) {
        const cookies = document.cookie.split(";").map(c => c.trim());
        for (const c of cookies) {
          if (c.startsWith(name + "=")) return decodeURIComponent(c.substring(name.length + 1));
        }
        return null;
      }
      function deleteCookie(name) {
        document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/`;
      }

      function showLoginLock() {
        const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById("loginModal"), {
          backdrop: "static",
          keyboard: false
        });
        modal.show();
        setTimeout(() => $("#loginUser").trigger("focus"), 200);
      }

      function hideLoginLock() {
        const m = bootstrap.Modal.getInstance(document.getElementById("loginModal"));
        if (m) m.hide();
      }

      function isAuthed() {
        return hasLibraLoginCookie();
      }


      // ✅ on page load
      (function enforceAuth() {
        if (isAuthed()) {
          hideLoginLock();
        } else {
          showLoginLock();
        }
      })();

      // ✅ login button
      $(document).on("click", "#btnDoLogin", function () {
        const enteredUserName = String($("#loginUser").val() || "").trim();
        const enteredPassword = String($("#loginPass").val() || "").trim();
        $("#loginErr").addClass("d-none");

        if (!enteredUserName || !enteredPassword) {
          $("#loginErr").removeClass("d-none").text("Enter username and password ");
          return;
        }

        $.ajax({
          method: "GET",
          url: "http://127.0.0.1:2200/getadmin"
        })
          .done(function (data) {
            data = Array.isArray(data) ? data : [];
            const admin = data[0];

            if (!admin) {
              $("#loginErr").removeClass("d-none").text("Admin not found in DB ");
              return;
            }

            // ✅ exactly your old logic (Name uppercase match)
            const ok =
              String(admin.Name || "").trim() === enteredUserName.toUpperCase() &&
              String(admin.Password || "").trim() === enteredPassword;

            if (!ok) {
              $("#loginErr").removeClass("d-none").text("Invalid username or password ");
              return;
            }

            // ✅ set cookie (7 days)
            const key = cookieKeyFromUsername(enteredUserName);
            setCookie(key, "1");



            hideLoginLock();
            $("#btnDashboard").trigger("click"); // optional
          })
          .fail(function () {
            $("#loginErr").removeClass("d-none").text("Server error ");
          });
      });

      // ✅ Enter key login
      $(document).on("keydown", "#loginUser, #loginPass", function (e) {
        if (e.key === "Enter") $("#btnDoLogin").trigger("click");
      });

      // ✅ block navbar clicks if not logged in
      $(document).on("click", "#navbar button", function (e) {
        if (!isAuthed()) {
          e.preventDefault();
          showLoginLock();
          return false;
        }
      });

      // ✅ logout: delete cookie + open modal
      $("#logout").off("click").on("click", function () {
        const ck = getLibraCookieName();
        if (ck) deleteCookie(ck);


        $("#loginUser").val("");
        $("#loginPass").val("");
        $("#loginErr").addClass("d-none");

        showLoginLock();
      });

      // ================= LOGIN UI LOCK =================
      function lockUI() {
        $("body").addClass("login-lock");
      }
      function unlockUI() {
        $("body").removeClass("login-lock");
      }

      // when modal opens
      $(document).on("shown.bs.modal", "#loginModal", function () {
        lockUI();
      });

      // when modal closes
      $(document).on("hidden.bs.modal", "#loginModal", function () {
        unlockUI();
      });


      // ================= QUICK ACTIONS (Dashboard) =================
      $(document).on("click", "#qaAddBook", function () {
        $("#btnBook").trigger("click");         // ✅ redirect to Books
      });

      $(document).on("click", "#qaIssueBook", function () {
        $("#btnIssue").trigger("click");        // ✅ redirect to Issue
      });

      $(document).on("click", "#qaReturnBook", function () {
        $("#btnStudent").trigger("click");      // ✅ redirect to Students (return is there)
      });

      $(document).on("click", "#qaViewOverdue", function () {
        // ✅ if overdue exists -> Students section + overdue filter ON, else msg
        $.ajax({ method: "GET", url: "http://127.0.0.1:2200/getstudents" })
          .done(function (students) {
            students = students || [];

            // find any overdue
            const hasAnyOverdue = students.some(studentHasOverdue);
            if (!hasAnyOverdue) {
              alert("✅ No overdue books available");
              return;
            }

            // go to Students page
            $("#btnStudent").trigger("click");
            // wait a bit for student.html to load then enable overdue filter
            setTimeout(function () {
              filterOverdueBooks = true;
              filterWithBooks = false;
              filterWithoutBooks = false;
              applyStudentFilters();
            }, 300);
          })
          .fail(function () {
            alert("Failed to check overdue ");
          });
      });



      // ================= BOOKS =================
      let allBooks = [];

      function fetchBooks() {
        $.ajax({ method: "GET", url: "http://127.0.0.1:2200/getbooks" })
          .done(function (data) {
            allBooks = data;
            renderBooks(allBooks);
          })
          .fail(function () {
            alert("Failed to load books ");
          });
      }

      function renderBooks(books) {
        $("#tbody").empty();
        if (!books || books.length === 0) {
          $("#tbody").append(`<tr><td colspan="7" class="text-center text-danger">No books found</td></tr>`);
          return;
        }

        books.forEach(book => {
          $("#tbody").append(`
        <tr data-bookid="${book.id}">
        <td>${book.id}</td>
        <td>${book.title}</td>
        <td>${book.author}</td>
        <td>${book.category}</td>
        <td>${book.quantity}</td>
        <td>
          <span class="badge ${book.status === "Available" ? "bg-success" : "bg-danger"}">
            ${book.status}
          </span>
        </td>
        <td class="d-flex">
          <button class="btn btn-sm btn-warning me-1"
            onclick="editBook(
              ${book.id},
              '${escapeQuotes(book.title)}',
              '${escapeQuotes(book.author)}',
              '${escapeQuotes(book.category)}',
              ${book.quantity},
              '${escapeQuotes(book.status)}'
            )">
            <i class="bi bi-pencil"></i>
          </button>

        <button class="btn btn-sm btn-danger delete-btn" data-id="${book.id}">
          <i class="bi bi-trash"></i>
        </button>
      </td>
    </tr>
  `);
        });

      }

      function escapeQuotes(s) {
        return String(s ?? "").replace(/'/g, "\\'");
      }

      function deleteBook(bookId) {
        if (!confirm("Are you sure you want to delete this book?")) return;

        $.ajax({ method: "DELETE", url: "http://127.0.0.1:2200/deletebook/" + bookId })
          .then(function (res) {
            alert(res);
            fetchBooks();
          })
          .catch(function () {
            alert("Error deleting book");
          });
      }

      $(document).on("click", ".delete-btn", function () {
        deleteBook($(this).data("id"));
      });

      $(document).on("submit", "#bookForm", function (e) {
        e.preventDefault();

        let bookId = $("#bookId").val().trim();
        if (!/^\d+$/.test(bookId)) {
          alert("Book ID must contain only numbers");
          return;
        }

        let qty = parseInt($("#quantity").val(), 10);
        if (!Number.isInteger(qty) || qty < 0) {
          alert("Quantity must be 0 or greater ");
          return;
        }

        let book = {
          id: Number(bookId),
          title: $("#title").val(),
          author: $("#author").val(),
          category: $("#category").val(),
          quantity: qty,   // ✅ changed
          status: $("#status").is(":checked") ? "Available" : "Not Available"
        };


        let isUpdate = $("#updateBtn").length > 0;

        $.ajax({
          method: isUpdate ? "PUT" : "POST",
          url: isUpdate
            ? "http://127.0.0.1:2200/updatebook/" + book.id
            : "http://127.0.0.1:2200/addbook",
          data: JSON.stringify(book),
          contentType: "application/json"
        })
          .done(function (res) {
            alert(res);
            $("#bookForm")[0].reset();
            $("#bookId").prop("readonly", false);
            $("#updateBtn")
              .text("Save Book")
              .removeClass("btn-warning")
              .addClass("btn-success")
              .removeAttr("id");
            fetchBooks();
          })
          .fail(function (xhr) {
            alert(xhr.responseText);
          });
      });

      $(document).on("keyup", "#bookSearch", function () {
        let keyword = $(this).val().toLowerCase();
        let filteredBooks = allBooks.filter(book =>
          String(book.title).toLowerCase().includes(keyword) ||
          String(book.author).toLowerCase().includes(keyword) ||
          String(book.category).toLowerCase().includes(keyword) ||
          String(book.id).includes(keyword)
        );
        renderBooks(filteredBooks);
      });

      // ✅ apne courses yaha set karo
      const COURSES = ["BCA", "BSC", "BCOM", "BA", "MCA", "MSC", "MBA"];

      // ================= STUDENTS =================
      $(document).on("click", "#openAddStudentModal", function () {
        resetStudentModal();
        let modal = bootstrap.Modal.getOrCreateInstance(document.getElementById("addStudentModal"));
        modal.show();
      });

      $(document).on("click", "#addStudentBtn", function () {
        let student = getStudentFromForm();
        if (!student) return;

        $.ajax({
          method: "POST",
          url: "http://127.0.0.1:2200/addstudent",
          contentType: "application/json",
          data: JSON.stringify(student)
        })
          .done(function (res) {
            alert(res);

            let modal = bootstrap.Modal.getInstance(document.getElementById("addStudentModal"));
            if (modal) modal.hide();

            resetStudentModal();
            loadStudents();
            loadStudentCounts();
          })
          .fail(function (xhr) {
            alert(xhr.responseText || "Operation failed ");
          });
      });

      $(document).on("click", ".delete-student-btn", function () {
        let rollNo = $(this).data("roll");
        let course = $(this).data("course");
        if (!confirm("Are you sure you want to delete this student?")) return;

        $.ajax({
          method: "DELETE",
          url: `http://127.0.0.1:2200/deletestudent/${rollNo}/${course}`
        })
          .done(function (res) {
            alert(res);
            loadStudents();
            loadStudentCounts();
          })
          .fail(function (xhr) {
            alert(xhr.responseText || "Delete failed ");
          });
      });

      // ✅ VIEW STUDENT + ISSUED BOOKS (Backend now returns fine/overdue/lateDays)
      $(document).on("click", ".view-student-btn", function () {
        const rollNo = $(this).data("roll");

        $("#viewRollNo").text("");
        $("#viewName").text("");
        $("#viewEmail").text("");
        $("#viewMobile").text("");
        $("#viewCourse").text("");

        $("#issuedCount").text("0");
        $("#viewIssuedTbody").empty().append(`
          <tr><td colspan="4" class="text-center text-muted">Loading...</td></tr>
        `);

        $.ajax({
          method: "GET",
          url: `http://127.0.0.1:2200/getstudent/${rollNo}`
        })
          .done(function (student) {
            $("#viewRollNo").text(student.rollNo ?? "-");
            $("#viewName").text(student.name ?? "-");
            $("#viewEmail").text(student.email ?? "-");
            $("#viewMobile").text(student.mobile ?? "-");
            $("#viewCourse").text(student.course ?? "-");

            const issued = Array.isArray(student.issuedBooks) ? student.issuedBooks : [];
            $("#issuedCount").text(issued.length);
            const tbody = $("#viewIssuedTbody").empty();

            if (issued.length === 0) {
              tbody.append(`<tr><td colspan="6" class="text-center">No books issued</td></tr>`);
            } else {
              issued.forEach((b, i) => {
                // ✅ backend preferred, fallback frontend
                const overdue = (typeof b.overdue === "boolean") ? b.overdue : isOverdueBook(b);
                const overdueClass = overdue ? "overdue-book" : "";

                const fine = overdue ? (Number(b.fine) || calcFine(b.dueDate)) : 0;

                // Fine paid localStorage (frontend)
                const paid = overdue ? (b.finePaid === true) : true;
                const fineUnpaid = overdue && !paid;
                const disableReturn = fineUnpaid ? "disabled" : "";

                const payBtn = fineUnpaid ? `
                  <button class="btn btn-sm btn-outline-danger open-pay-modal-btn ms-2"
                  data-roll="${student.rollNo}"
                  data-bookid="${b.bookId}"
                  data-amount="${fine}">
                  Pay ₹${fine}
                  </button>

                ` : "";

                tbody.append(`
                  <tr class="${overdueClass}">
                    <td>${i + 1}</td>
                    <td>${b.bookId ?? "-"}</td>
                    <td>${b.bookName ?? "-"}</td>
                    <td>${b.issueDate ?? "-"}</td>
                    <td>${b.loanDays ?? "-"}</td>
                    <td>${b.dueDate ?? "-"}</td>

                    <td class="text-center">
                      <button class="btn btn-sm btn-outline-success return-book-btn"
                        ${disableReturn}
                        data-roll="${student.rollNo}"
                        data-bookid="${b.bookId}">
                        <i class="bi bi-arrow-return-left"></i>
                      </button>

                      ${payBtn}
                    </td>
                  </tr>
                `);
              });
            }

            bootstrap.Modal.getOrCreateInstance(document.getElementById("viewStudentModal")).show();
            $("#historySwitch").prop("checked", false);
            $("#historyBox").addClass("d-none");
            $("#historyTbody").empty();

          })
          .fail(function (xhr) {
            $("#viewIssuedTbody").empty().append(`
              <tr><td colspan="6" class="text-center text-muted">Loading...</td></tr>
            `);
            alert(xhr.responseText || "Failed to fetch student");
          });
      });

      //edit student data 
      function validateStudentInline({ name, email, mobile, course }) {
        if (!name || !/^[A-Za-z\s]+$/.test(name)) return "Enter valid Name";
        if (!email || !email.endsWith("@gmail.com")) return "Enter valid Gmail";
        if (!mobile || !/^\d{10}$/.test(mobile)) return "Enter valid mobile";
        if (!course) return "Select course";
        return null;
      }

      $(document).on("click", ".edit-student-inline-btn", function () {
        const $tr = $(this).closest("tr");

        // already editing -> ignore
        if ($tr.hasClass("editing")) return;

        const student = $tr.data("student");
        if (!student) return alert("Student data missing");

        $tr.addClass("editing");

        // keep backup for cancel
        $tr.data("backup", {
          rollNo: student.rollNo,
          name: student.name,
          email: student.email,
          mobile: student.mobile,
          course: student.course,
          issuedCount: getIssuedCount(student)
        });

        // ✅ make editable inputs (roll + issued readonly as per your need)
        $tr.find(".td-name").html(`<input type="text" class="form-control form-control-sm inp-name" value="${student.name || ""}">`);
        $tr.find(".td-email").html(`<input type="text" class="form-control form-control-sm inp-email" value="${student.email || ""}">`);
        $tr.find(".td-mobile").html(`<input type="text" class="form-control form-control-sm inp-mobile" value="${student.mobile || ""}">`);
        $tr.find(".td-course").html(buildCourseSelect(student.course));

        // ✅ rollNo + issued readonly (no change)
        // td-roll and td-issued remain text only

        // ✅ replace action buttons with Save/Cancel
        $tr.find(".td-action").html(`
    <button class="btn btn-sm btn-success save-inline-student-btn">
      <i class="bi bi-check2"></i>
    </button>
    <button class="btn btn-sm btn-secondary cancel-inline-student-btn ms-1">
      <i class="bi bi-x"></i>
    </button>
  `);
      });

      $(document).on("click", ".cancel-inline-student-btn", function () {
        const $tr = $(this).closest("tr");
        const backup = $tr.data("backup");
        if (!backup) return;

        $tr.removeClass("editing");

        $tr.find(".td-roll").text(backup.rollNo);
        $tr.find(".td-name").text(backup.name);
        $tr.find(".td-email").text(backup.email);
        $tr.find(".td-mobile").text(backup.mobile);
        $tr.find(".td-course").text(backup.course);
        $tr.find(".td-issued").text(backup.issuedCount);

        // restore action buttons
        $tr.find(".td-action").html(`
    <button class="btn btn-sm btn-info text-white view-student-btn" data-roll="${backup.rollNo}">
      <i class="bi bi-eye"></i>
    </button>

    <button class="btn btn-sm btn-warning text-white edit-student-inline-btn ms-1">
      <i class="bi bi-pencil"></i>
    </button>

    <button class="btn btn-sm btn-danger delete-student-btn ms-1"
      data-roll="${backup.rollNo}"
      data-course="${backup.course}">
      <i class="bi bi-trash"></i>
    </button>
  `);

        // update row attrs
        $tr.attr("data-roll", backup.rollNo);
        $tr.attr("data-oldcourse", backup.course);
      });

      $(document).on("click", ".save-inline-student-btn", function () {
        const $tr = $(this).closest("tr");
        const rollNo = Number($tr.attr("data-roll"));          // ✅ readonly
        const oldCourse = String($tr.attr("data-oldcourse"));  // ✅ key for PUT route

        const name = String($tr.find(".inp-name").val() || "").trim().toUpperCase();
        const email = String($tr.find(".inp-email").val() || "").trim();
        const mobile = String($tr.find(".inp-mobile").val() || "").trim();
        const course = String($tr.find(".inp-course").val() || "").trim();

        const errMsg = validateStudentInline({ name, email, mobile, course });
        if (errMsg) return alert(errMsg);

        // payload (rollNo readonly but still send)
        const payload = { rollNo, name, email, mobile, course };

        $.ajax({
          method: "PUT",
          url: `http://127.0.0.1:2200/updatestudent/${rollNo}/${encodeURIComponent(oldCourse)}`,
          contentType: "application/json",
          data: JSON.stringify(payload)
        })
          .done((msg) => {
            alert(msg);

            // easiest + safest: refresh list from DB
            loadStudents();
            loadStudentCounts();
          })
          .fail((xhr) => {
            alert(xhr.responseText || "Update failed ");
          });
      });

      function buildCourseSelect(selectedCourse) {
        const sel = String(selectedCourse || "").trim();
        const opts = COURSES.map(c => {
          const val = String(c);
          const selected = (val.toUpperCase() === sel.toUpperCase()) ? "selected" : "";
          return `<option value="${val}" ${selected}>${val}</option>`;
        }).join("");
        return `<select class="form-select form-select-sm inp-course">${opts}</select>`;
      }


      // ✅ RETURN BOOK BUTTON HANDLER
      $(document).on("click", ".return-book-btn", function () {
        if ($(this).is(":disabled")) {
          return alert("Pay fine first");
        }

        const rollNo = Number($(this).data("roll"));
        const bookId = Number($(this).data("bookid"));

        if (!confirm(`Return Book ID ${bookId}?`)) return;

        $.ajax({
          method: "POST",
          url: "http://127.0.0.1:2200/returnbook",
          contentType: "application/json",
          data: JSON.stringify({ rollNo, bookId })
        })
          .done(function (res) {
            alert(res);
            $(`.view-student-btn[data-roll="${rollNo}"]`).trigger("click");
            loadStudents();
            fetchBooks();
            loadStudentCounts();
          })
          .fail(function (xhr) {
            alert(xhr.responseText || "Return failed ");
          });
      });





      function resetStudentModal() {
        $("#studentForm")[0].reset();
        $("#studentModalTitle").html('<i class="bi bi-person-plus"></i> Add New Student');
      }

      $('#addStudentModal').on('hidden.bs.modal', function () {
        resetStudentModal();
        $('body').removeClass('modal-open');
        $('body').css('overflow', '');
        $('.modal-backdrop').remove();
      });

      function getStudentFromForm() {
        let rollNo = $("#rollNo").val().trim();
        let name = $("#studentName").val().trim();
        let email = $("#email").val().trim();
        let mobile = $("#mobile").val().trim();
        let course = $("#course").val();

        if (!rollNo || isNaN(rollNo)) { alert("Enter valid Roll No"); return null; }
        if (!name || !/^[A-Za-z\s]+$/.test(name)) { alert("Enter valid Name"); return null; }
        if (!email || !email.endsWith("@gmail.com")) { alert("Enter valid Gmail"); return null; }
        if (!mobile || !/^\d{10}$/.test(mobile)) { alert("Enter valid mobile"); return null; }
        if (!course) { alert("Select course"); return null; }

        return { rollNo: Number(rollNo), name, email, mobile, course };
      }

      // ================= STUDENT FILTER TOGGLES =================
      $(document).on("click", "#toggleWithBooks", function () {
        filterWithBooks = !filterWithBooks;

        if (filterWithBooks) {
          filterWithoutBooks = false;
          filterOverdueBooks = false;
        }
        applyStudentFilters();
      });

      $(document).on("click", "#toggleWithoutBooks", function () {
        filterWithoutBooks = !filterWithoutBooks;

        if (filterWithoutBooks) {
          filterWithBooks = false;
          filterOverdueBooks = false;
        }
        applyStudentFilters();
      });

      $(document).on("click", "#toggleOverdueBooks", function () {
        filterOverdueBooks = !filterOverdueBooks;

        if (filterOverdueBooks) {
          filterWithBooks = false;
          filterWithoutBooks = false;
        }
        applyStudentFilters();
      });

      $(document).on("keyup", "#studentSearch", function () {
        applyStudentFilters();
      });



      // ✅ AUTO LOAD DASHBOARD ON FIRST PAGE LOAD
      $.ajax({ method: "GET", url: "dashboard.html" })
        .then(function (res) {
          $("#section").html(res);
          loadDashboardCounts();

      function todayISODate() {
        const d = new Date();
        const yyyy = d.getFullYear();

        const dd = String(d.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;

      function addDaysISO(isoDate, days) {
        const d = new Date(isoDate + "T00:00:00");
        d.setDate(d.getDate() + Number(days));
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
      }

    function applyStudentFilters() {
      const q = String($("#studentSearch").val() || "").toLowerCase().trim();
      let list = studentsCache.slice();

      if (filterOverdueBooks) list = list.filter(studentHasOverdue);
      else if (filterWithBooks) list = list.filter(studentHasBooks);
      else if (filterWithoutBooks) list = list.filter(s => !studentHasBooks(s));

      if (q) {
        const qLower = q.toLowerCase();

        // ✅ if user typed only digits => treat as possible RollNo OR BookId
        const isOnlyDigits = /^\d+$/.test(qLower);
        const qNum = isOnlyDigits ? Number(qLower) : null;

        list = list.filter(s => {
          const matchBasic =
            String(s.rollNo).toLowerCase().includes(qLower) ||
            String(s.name).toLowerCase().includes(qLower) ||
            String(s.course).toLowerCase().includes(qLower);

          // ✅ bookId search (only when numeric input)
          const matchBookId = isOnlyDigits ? studentHasIssuedBookId(s, qNum) : false;

          return matchBasic || matchBookId;
        });
      }
      // ✅ latest students on top (by RollNo descending)
      list.sort((a, b) => Number(b.rollNo || 0) - Number(a.rollNo || 0));

      renderStudentsTable(list);

      if (!list.length) $("#noStudentRow").removeClass("d-none");
      else $("#noStudentRow").addClass("d-none");

      updateFilterButtonsUI();
    }

    // ✅ overdue check (fallback)
    function isOverdueBook(book) {
      if (!book || !book.dueDate) return false;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const due = new Date(String(book.dueDate).slice(0, 10) + "T00:00:00");
      return due < today;
    }

    // fallback days
    function daysBetween(dueISO) {
      const due = new Date(String(dueISO).slice(0, 10) + "T00:00:00");
      const today = new Date(); today.setHours(0, 0, 0, 0);
      if (isNaN(due)) return 0;
      return Math.floor((today - due) / (1000 * 60 * 60 * 24));
    }

    // fallback fine
    function calcFine(dueDate) {
      const d = daysBetween(dueDate);
      if (d <= 0) return 0;
      if (d >= 1 && d <= 7) return 100;
      if (d >= 8 && d <= 15) return 500;
      if (d >= 16 && d <= 30) return 700;
      return 1000;
    }

    function formatDateOnly(iso) {
      if (!iso) return "-";
      return String(iso).slice(0, 10);   // ✅ 2026-02-04
    }

    function loadStudentCounts() {
      $.ajax({

        url: "http://127.0.0.1:2200/getstudents"
      })
        .then(function (data) {
          const students = data || [];

          $("#totalStudents").text(students.length);

          let studentsWithBooks = 0;
          let totalIssuedBooks = 0;
          let overdueBooks = 0;

          const today = new Date();
          today.setHours(0, 0, 0, 0);

          students.forEach(s => {
            const issued = Array.isArray(s.issuedBooks) ? s.issuedBooks : [];
            const legacyIssued = Number(s.booksIssued || 0);

            const count = issued.length > 0 ? issued.length : legacyIssued;

            if (count > 0) studentsWithBooks++;
            totalIssuedBooks += count;

            issued.forEach(b => {
              const due = new Date(String(b.dueDate).slice(0, 10) + "T00:00:00");
              if (!isNaN(due) && due < today) overdueBooks++;
            });
          });

          $("#studentsWithBooks").text(studentsWithBooks);
          $("#totalIssuedBooks").text(totalIssuedBooks);
          $("#overdueBooksCount").text(overdueBooks);
        })
        .catch(function () {
          $("#totalStudents").text("Error");
          $("#studentsWithBooks").text("Error");
          $("#totalIssuedBooks").text("Error");
          $("#overdueBooksCount").text("Error");
        });
    }

    function parseISODate(iso) {
      if (!iso) return null;
      const d = new Date(String(iso).slice(0, 10) + "T00:00:00");
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function studentHasOverdue(student) {
      const issued = Array.isArray(student.issuedBooks) ? student.issuedBooks : [];
      if (!issued.length) return false;

      // ✅ backend gives hasOverdue too (safe)
      if (typeof student.hasOverdue === "boolean") return student.hasOverdue;

      const today = startOfToday();
      return issued.some(b => {
        const due = parseISODate(b.dueDate);
        return due && due < today;
      });
    }

    function formatPretty(iso) {
      const d = parseISODate(iso);
      if (!d) return "-";
      return d.toLocaleDateString(undefined, { day: "2-digit", month: "short", year: "numeric" });
    }

    function isOverdue(issuedItem) {
      const due = parseISODate(issuedItem?.dueDate);
      if (!due) return false;
      return due < startOfToday();
    }

    function loadDashboardCounts() {
      $.ajax({ method: "GET", url: "http://127.0.0.1:2200/getbooks" })
        .then(function (books) {
          books = books || [];

          // ✅ count only AVAILABLE + qty > 0
          const availableCount = books.filter(b =>
            String(b.status || "").toUpperCase() === "AVAILABLE" &&
            Number(b.quantity || 0) > 0
          ).length;

          $("#totalBooks").text(availableCount);
        })
        .catch(function () {
          $("#totalBooks").text("Error");
        });


      $.ajax({ method: "GET", url: "http://127.0.0.1:2200/getstudents" })
        .then(function (students) {
          students = students || [];

          $("#totalStudents").text(students.length);

          let issuedCount = 0;
          let overdueCount = 0;

          const flattened = [];

          students.forEach((s) => {
            const issued = Array.isArray(s.issuedBooks) ? s.issuedBooks : [];

            issuedCount += issued.length;

            issued.forEach((b) => {
              if (isOverdue(b)) overdueCount++;

              flattened.push({
                studentName: s.name || "-",
                rollNo: s.rollNo ?? "-",
                course: s.course || "-",
                bookName: b.bookName || "-",
                issueDate: b.issueDate || "",
                dueDate: b.dueDate || "",
                overdue: isOverdue(b)
              });
            });
          });

          $("#issuedBooksCount").text(issuedCount);
          $("#overdueBooksCount").text(overdueCount);

          flattened.sort((a, b) => {
            const da = parseISODate(a.issueDate) || parseISODate(a.dueDate) || new Date(0);
            const db = parseISODate(b.issueDate) || parseISODate(b.dueDate) || new Date(0);
            return db - da;
          });

          const top = flattened.slice(0, 5);

        })
        .catch(function () {
          $("#totalStudents").text("Error");
          $("#issuedBooksCount").text("Error");
          $("#overdueBooksCount").text("Error");
          $("#recentIssuedTbody").html(`<tr><td colspan="5" class="text-center text-danger">Failed to load</td></tr>`);
        });
    }

    function editBook(id, title, author, category, quantity, status) {
      id = Number(id);

      // form fill
      $("#bookId").val(id).prop("readonly", true);
      $("#title").val(title);
      $("#author").val(author);
      $("#category").val(category);
      $("#quantity").val(quantity);
      $("#status").prop("checked", status === "Available");

      $("#bookForm button[type='submit']")
        .text("Update Book")
        .removeClass("btn-success")
        .addClass("btn-warning")
        .attr("id", "updateBtn");

      // ✅ highlight selected row
      $("#tbody tr").removeClass("book-highlight");
      $(`#tbody tr[data-bookid="${id}"]`).addClass("book-highlight")[0]?.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });

    }

    // ================= REPORTS (Front-End) =================

    function isoToday() {
      return new Date().toISOString().slice(0, 10);
    }

    function setDefaultReportDates() {
      if ($("#fromDate").length) $("#fromDate").val(isoToday());
      if ($("#toDate").length) $("#toDate").val(isoToday());
    }

    function showHideReportFilters() {
      const t = String($("#reportType").val() || "ACTIVITY").toUpperCase();

      const groups = [
        ".report-date",
        ".report-activity-type",
        ".report-course",
        ".report-roll",
        ".report-book",
        ".report-fine-mode",
        ".report-overdue-days",
        ".report-inv-status",
        ".report-inv-low",
        ".report-ledger-roll"
      ];
      groups.forEach(g => $(g).hide());

      if (t === "ACTIVITY") {
        $(".report-date, .report-activity-type, .report-course, .report-roll, .report-book").show();
      } else if (t === "OVERDUE") {
        // ✅ NOW overdue also has from/to
        $(".report-date, .report-course, .report-overdue-days, .report-roll, .report-book").show();
      } else if (t === "FINE") {
        $(".report-date, .report-fine-mode, .report-course, .report-roll, .report-book").show();
      } else if (t === "INVENTORY") {
        $(".report-inv-status, .report-inv-low").show();
      } else if (t === "LEDGER") {
        $(".report-ledger-roll").show();
      }
    }


    function setReportHeader(title, metaText) {
      $("#reportTitle").text(title || "Report Result");
      $("#reportMeta").text(metaText || `Generated: ${isoToday()}`);
    }


    function setReportTableHead(cols) {
      const th = cols.map(c => `<th>${c}</th>`).join("");
      $("#reportThead").html(`<tr>${th}</tr>`);
    }

    function setNoRows(colspan, msg) {
      $("#reportTbody").html(`<tr><td colspan="${colspan}" class="text-center text-success fw-semibold p-4">${msg}</td></tr>`);
    }

    function statusBadge(type) {
      const t = String(type || "").toUpperCase();
      if (t === "ISSUED") return `<span class="badge bg-success">ISSUED</span>`;
      if (t === "RETURNED") return `<span class="badge bg-warning text-dark">RETURNED</span>`; // ✅ Yellow
      return `<span class="badge bg-danger">OVERDUE</span>`;
    }

    function safeISO(d) {
      // ensure YYYY-MM-DD
      if (!d) return "-";
      return String(d).slice(0, 10);
    }

    function buildReportMeta(type) {
      type = String(type || "").toUpperCase();

      const parts = [];

      // common filters
      const course = ($("#reportCourse").val() || "").trim();
      const rollNo = ($("#reportRollNo").val() || "").trim();
      const bookId = ($("#reportBookId").val() || "").trim();

      // date filters (Activity + Fine + Overdue if you want)
      const from = ($("#fromDate").val() || "").trim();
      const to = ($("#toDate").val() || "").trim();

      // ✅ show dates only for ACTIVITY / FINE / OVERDUE (NOT inventory / ledger)
      if (type === "ACTIVITY" || type === "FINE" || type === "OVERDUE") {
        if (from) parts.push(`From: ${from}`);
        if (to) parts.push(`To: ${to}`);
      }


      if (course) parts.push(`Course: ${course}`);
      if (rollNo) parts.push(`RollNo: ${rollNo}`);
      if (bookId) parts.push(`BookID: ${bookId}`);

      if (type === "ACTIVITY") {
        const actType = ($("#activityType").val() || "ALL").trim();
        if (actType) parts.push(`Type: ${actType}`);
      }

      if (type === "OVERDUE") {
        const bucket = ($("#overdueBucket").val() || "").trim();
        if (bucket) parts.push(`Overdue Days: ${bucket}`);
      }

      if (type === "FINE") {
        const mode = ($("#fineMode").val() || "PENDING").trim().toUpperCase();
        parts.push(`Mode: ${mode}`);
      }

      if (type === "INVENTORY") {
        const st = ($("#invStatus").val() || "").trim();
        const low = ($("#invLowStock").val() || "").trim();
        if (st) parts.push(`Status: ${st}`);
        if (low) parts.push(`Low Stock: <=2`);
      }

      if (type === "LEDGER") {
        const lr = ($("#ledgerRollNo").val() || "").trim();
        if (lr) parts.push(`Ledger RollNo: ${lr}`);
      }

      parts.push(`Generated: ${isoToday()}`);

      return parts.join(" | ");
    }





    // Main generate
    function generateReport() {
      const type = String($("#reportType").val() || "ACTIVITY").toUpperCase();

      if (type === "ACTIVITY") return loadReportActivity();
      if (type === "OVERDUE") return loadReportOverdue();
      if (type === "FINE") return loadReportFine();
      if (type === "INVENTORY") return loadReportInventory();
      if (type === "LEDGER") return loadReportLedger();
    }

    // ====== API Calls ======

    function loadReportActivity() {
      setReportHeader("Activity Report", buildReportMeta("ACTIVITY"));

      const from = $("#fromDate").val() || isoToday();
      const to = $("#toDate").val() || isoToday();
      const actType = $("#activityType").val() || "ALL";
      const course = $("#reportCourse").val() || "";
      const rollNo = $("#reportRollNo").val() || "";
      const bookId = $("#reportBookId").val() || "";

      setReportTableHead(["Student", "Book ID", "Issue Date", "Due Date", "Status"]);
      $("#reportTbody").html(`<tr><td colspan="5" class="text-center text-muted p-4">Loading...</td></tr>`);

      $.ajax({
        method: "GET",
        url: `http://127.0.0.1:2200/report/activity?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&type=${encodeURIComponent(actType)}&course=${encodeURIComponent(course)}&rollNo=${encodeURIComponent(rollNo)}&bookId=${encodeURIComponent(bookId)}`
      })
        .done(function (data) {
          const rows = Array.isArray(data.rows) ? data.rows : [];

          // ✅ latest first
          rows.sort((a, b) => (String(b.updatedAt || b.createdAt || b.issueDate || "")).localeCompare(String(a.updatedAt || a.createdAt || a.issueDate || "")));

          if (!rows.length) return setNoRows(5, "✅ No records");

          const html = rows.map(r => `
        <tr>
          <td>${(r.name || "-")} <span class="text-muted">(${r.rollNo || "-"})</span></td>
          <td>${r.bookId ?? "-"}</td>
          <td>${safeISO(r.issueDate)}</td>
          <td>${safeISO(r.dueDate)}</td>
          <td>${statusBadge(r.type || r.status)}</td>
        </tr>
      `).join("");

          $("#reportTbody").html(html);
        })
        .fail(function (xhr) {
          setNoRows(5, xhr.responseText || "Failed to load ");
        });
    }

    function loadReportOverdue() {
      setReportHeader("Overdue Report", buildReportMeta("OVERDUE"));

      const from = $("#fromDate").val() || isoToday();
      const to = $("#toDate").val() || isoToday();

      const course = $("#reportCourse").val() || "";
      const rollNo = $("#reportRollNo").val() || "";
      const bookId = $("#reportBookId").val() || "";
      const bucket = $("#overdueBucket").val() || "";

      // ✅ overdueDays column between dueDate and status
      setReportTableHead(["Student", "Book ID", "Issue Date", "Due Date", "Overdue Days", "Status"]);
      $("#reportTbody").html(`<tr><td colspan="6" class="text-center text-muted p-4">Loading...</td></tr>`);

      $.ajax({
        method: "GET",
        url: `http://127.0.0.1:2200/report/overdue?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&course=${encodeURIComponent(course)}&rollNo=${encodeURIComponent(rollNo)}&bookId=${encodeURIComponent(bookId)}&bucket=${encodeURIComponent(bucket)}`
      })
        .done(function (data) {
          let rows = Array.isArray(data.rows) ? data.rows : [];

          // ✅ bucket filter frontend (backend me nahi hai to yahi apply kar do)
          if (bucket) {
            const [a, b] = bucket.split("-").map(Number);
            rows = rows.filter(r => Number(r.overdueDays || 0) >= a && Number(r.overdueDays || 0) <= b);
          }

          // ✅ latest overdue first (highest days / latest due)
          rows.sort((a, b) => (Number(b.overdueDays || 0) - Number(a.overdueDays || 0)));

          if (!rows.length) return setNoRows(6, " No overdue");

          $("#reportTbody").html(rows.map(r => `
        <tr>
          <td>${(r.name || "-")} <span class="text-muted">(${r.rollNo || "-"})</span></td>
          <td>${r.bookId ?? "-"}</td>
          <td>${safeISO(r.issueDate)}</td>
          <td>${safeISO(r.dueDate)}</td>
          <td class="fw-semibold text-danger">${Number(r.overdueDays || 0)}</td>
          <td>${statusBadge("OVERDUE")}</td>
        </tr>
      `).join(""));
        })
        .fail(function (xhr) {
          setNoRows(6, xhr.responseText || "Failed to load ");
        });
    }

    function loadReportFine() {
      const mode = String($("#fineMode").val() || "PENDING").toUpperCase();
      setReportHeader(mode === "PAID" ? "Students who Paids Fine" : "Students who Need to Pay Fine", buildReportMeta("FINE"));


      const from = $("#fromDate").val() || isoToday();
      const to = $("#toDate").val() || isoToday();
      const course = $("#reportCourse").val() || "";
      const rollNo = $("#reportRollNo").val() || "";
      const bookId = $("#reportBookId").val() || "";

      const cols = (mode === "PAID")
        ? ["Student", "Book ID", "Issue Date", "Due Date", "Fine Amt", "Paid At", "Status"]
        : ["Student", "Book ID", "Issue Date", "Due Date", "Fine Amt", "Status"];   // ✅ add Fine Amt


      setReportTableHead(cols);

      const colspan = (mode === "PAID") ? 7 : 6;
      $("#reportTbody").html(`<tr><td colspan="${colspan}" class="text-center text-muted p-4">Loading...</td></tr>`);

      $.ajax({
        method: "GET",
        url: `http://127.0.0.1:2200/report/fines?mode=${encodeURIComponent(mode)}&from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&course=${encodeURIComponent(course)}&rollNo=${encodeURIComponent(rollNo)}&bookId=${encodeURIComponent(bookId)}`
      })
        .done(function (data) {
          const rows = Array.isArray(data.rows) ? data.rows : [];

          // ✅ latest first
          rows.sort((a, b) => String(b.paidAt || b.dueDate || "").localeCompare(String(a.paidAt || a.dueDate || "")));

          if (!rows.length) return setNoRows(colspan, " No records");

          $("#reportTbody").html(rows.map(r => {
            const studentCell = `${(r.name || "-")} <span class="text-muted">(${r.rollNo || "-"})</span>`;
            const issue = safeISO(r.issueDate);
            const due = safeISO(r.dueDate);

            if (mode === "PAID") {
              return `
            <tr>
              <td>${studentCell}</td>
              <td>${r.bookId ?? "-"}</td>
              <td>${issue}</td>
              <td>${due}</td>
              <td class="fw-bold text-danger">₹${Number(r.fineAmount || 0)}</td>
              <td>${safeISO(r.paidAt)}</td>
              <td><span class="badge bg-success">PAID</span></td>
            </tr>
          `;
            }

            return `
          <tr>
            <td>${studentCell}</td>
            <td>${r.bookId ?? "-"}</td>
            <td>${issue}</td>
            <td>${due}</td>
            <td class="fw-bold text-danger">₹${Number(r.fineAmount || r.fine || 0)}</td>   <!-- ✅ Fine Amt -->
            <td><span class="badge bg-danger">PENDING</span></td>
          </tr>
        `;
          }).join(""));
        })
        .fail(function (xhr) {
          setNoRows(colspan, xhr.responseText || "Failed to load ");
        });
    }


    function loadReportInventory() {
      setReportHeader("Inventory Report", buildReportMeta("INVENTORY"));

      const status = $("#invStatus").val() || "";
      const low = $("#invLowStock").val() || "";

      setReportTableHead(["Book ID", "Book Name", "Author", "Category", "Qty", "Status"]);
      $("#reportTbody").html(`<tr><td colspan="6" class="text-center text-muted p-4">Loading...</td></tr>`);

      $.ajax({
        method: "GET",
        url: `http://127.0.0.1:2200/report/inventory?status=${encodeURIComponent(status)}&low=${encodeURIComponent(low)}`
      })
        .done(function (data) {
          const rows = Array.isArray(data.rows) ? data.rows : [];
          if (!rows.length) return setNoRows(6, " No records");

          $("#reportTbody").html(rows.map(r => `
        <tr>
          <td>${r.id ?? "-"}</td>
          <td>${r.bookName || "-"}</td>
          <td>${r.author || "-"}</td>
          <td>${r.category || "-"}</td>
          <td class="fw-semibold">${Number(r.qty || 0)}</td>
          <td><span class="badge ${String(r.status || "").toUpperCase() === "AVAILABLE" ? "bg-success" : "bg-danger"}">${r.status || "-"}</span></td>
        </tr>
      `).join(""));
        })
        .fail(function (xhr) {
          setNoRows(6, xhr.responseText || "Failed to load ");
        });
    }

    function loadReportLedger() {
      setReportHeader("Student Ledger", buildReportMeta("LEDGER"));


      const rollNo = Number($("#ledgerRollNo").val() || 0);
      if (!rollNo) {
        setNoRows(5, "Enter Roll No ");
        return;
      }

      setReportTableHead(["Book ID", "Issue Date", "Due Date", "Return Date", "Status", "Overdue Days", "Fine", "Paid At"]);
      $("#reportTbody").html(`<tr><td colspan="8" class="text-center text-muted p-4">Loading...</td></tr>`);

      $.ajax({
        method: "GET",
        url: `http://127.0.0.1:2200/report/studentledger/${rollNo}`
      })
        .done(function (data) {
          const rows = Array.isArray(data.rows) ? data.rows : [];

          // ✅ header meta
          $("#reportMeta").text(`Student: ${data.name || "-"} (${data.rollNo || rollNo}) | Course: ${data.course || "-"} | Generated: ${isoToday()}`);

          // latest first already from backend, but safe:
          rows.sort((a, b) => String(b.issueDate || "").localeCompare(String(a.issueDate || "")));

          if (!rows.length) return setNoRows(8, " No history");

          $("#reportTbody").html(rows.map(r => `
        <tr>
          <td>${r.bookId ?? "-"}</td>
          <td>${safeISO(r.issueDate)}</td>
          <td>${safeISO(r.dueDate)}</td>
          <td>${r.returnDate ? safeISO(r.returnDate) : "-"}</td>
          <td>${statusBadge(r.status)}</td>
          <td class="text-danger fw-semibold">${Number(r.overdueDays || 0)}</td>
          <td class="fw-bold text-danger">₹${Number(r.fineAmount || 0)}</td>
          <td>${r.paidAt ? safeISO(r.paidAt) : "-"}</td>
        </tr>
      `).join(""));
        })
        .fail(function (xhr) {
          setNoRows(8, xhr.responseText || "Failed to load ");
        });
    }


    // ================= Hook events when report.html loads =================
    function initReportPage() {
      if (!document.getElementById("reportType")) return;

      setDefaultReportDates();
      showHideReportFilters();
      setReportHeader("Report Result");

      $("#reportType").on("change", function () {
        showHideReportFilters();
      });

      $("#btnGenerateReport").on("click", function () {
        generateReport();
      });

      $("#btnPrintReport").on("click", function () {
        window.print();
      });

      $("#btnExportPDF").on("click", function () {
        const el = document.querySelector("#reportThead")?.closest(".card");
        if (!el) return alert("Report section not found ");

        const type = ($("#reportType").val() || "report").toLowerCase();
        const filename = `report_${type}_${isoToday()}.pdf`;

        const opt = {
          margin: 10,
          filename,
          image: { type: "jpeg", quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
        };

        html2pdf().set(opt).from(el).save();
      });

    }


  </script>
</head>

              <div class="mt-3">
                <label class="form-label">Collected By (optional)</label>
                <input type="text" id="payCollectedBy" class="form-control" value="Admin One">
              </div>

              <div class="mt-3">
                <label class="form-label">Notes (optional)</label>
                <textarea id="payNotes" class="form-control" rows="2"></textarea>
              </div>
            </div>

            <div class="modal-footer">
              <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
              <button class="btn btn-success" id="confirmPayBtn">Confirm Payment</button>
            </div>
          </div>
        </div>
      </div>

    </main>

  </div>

  <!-- ✅ LOGIN MODAL (LOCK SCREEN) -->
  <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width:420px;">
      <div class="modal-content shadow">
        <div class="modal-header">
          <h5 class="modal-title">Admin Login</h5>
        </div>

        <div class="modal-body">
          <label class="form-label">UserName</label>
          <div class="input-group">
            <span class="bi bi-person input-group-text"></span>
            <input type="text" id="loginUser" class="form-control" placeholder="Enter UserName">
          </div>

          <label class="form-label mt-3">Password</label>
          <div class="input-group">
            <span class="bi bi-key input-group-text"></span>
            <input type="password" id="loginPass" class="form-control" placeholder="Enter Password">
          </div>

          <div id="loginErr" class="text-danger small d-none mt-2">Invalid username or password </div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-primary w-100" id="btnDoLogin">
            Sign In <span class="bi bi-arrow-right-short"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
