<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
  <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
  <script src="../node_modules/jquery/dist/jquery.js"></script>
  <title>Document</title>
  <script>
  $(function () {

    $("#btnLogin").on("click", function () {

      let enteredUserName = $("#txtName").val().trim();
      let enteredPassword = $("#txtPwd").val().trim();

      console.log("Entered Username:", enteredUserName);
      console.log("Entered Password:", enteredPassword);

      $.ajax({
        method: "GET",
        url: "http://127.0.0.1:2200/getadmin",
        success: function (data) {

          console.log("API Data:", data);

          let admin = data[0];

          console.log("DB Username:", admin.Name);
          console.log("DB Password:", admin.Password);

          if (
            admin.Name.trim() === enteredUserName.toUpperCase() &&
            admin.Password.trim() === enteredPassword
          ) {
            alert("Login successful");
            window.location.href = "index.html";

          } else {
            alert("Invalid username or password");
          }
        },
        error: function (err) {
          console.log("API Error:", err);
          alert("Server error");
        }
      });

    });

  });
</script>
  <style>
    #formContainer{
      padding: 20px;
      height: 400px;
      box-shadow: 1px 2px 3px gray;
      background-color: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body class="container-fluid vh-100">

  <!-- Mobile heading (NO background) -->
  <div class="d-md-none text-center py-3">
    <h1 class="fw-bold">LIBRA ADMIN</h1>
  </div>

  <div class="row h-100">

    <!-- LEFT COLUMN (DESKTOP ONLY) -->
    <div class="col-md-6 d-none d-md-flex flex-column justify-content-center align-items-center bg-primary p-4">

      <div style="width: 400px;">
        <h1 class="text-white">LIBRA ADMIN</h1>
        <p class="text-white text-opacity-50">Library Management System</p>

        <h1 class="text-white mt-4">Welcome Back!</h1>
        <p class="text-white text-opacity-50 mt-3">
          Sign in to access your admin dashboard and manage your library with ease.
        </p>

        <ul class="text-white text-opacity-75 mt-4 list-unstyled">
          <li class="mt-3"><span class="bi bi-peace-fill me-2"></span>Secure & Reliable</li>
          <li class="mt-3"><span class="bi bi-peace-fill me-2"></span>Real-time Analytics</li>
          <li class="mt-3"><span class="bi bi-peace-fill me-2"></span>Comprehensive Management</li>
        </ul>
      </div>

    </div>

    <!-- RIGHT COLUMN (LOGIN FORM) -->
    <div class="col-md-6 d-flex justify-content-center align-items-start align-items-md-center p-4">

      <div id="formContainer" class="w-100" style="max-width: 360px;">
        <h1>Sign In</h1>
        <p class="text-dark text-opacity-50">
          Enter your credentials to access your account
        </p>

        <label class="form-label mt-2">UserName</label>
        <div class="input-group">
          <span class="bi bi-person input-group-text"></span>
          <input type="text" id="txtName" class="form-control" placeholder="Enter UserName" required>
        </div>

        <label class="form-label mt-3">Password</label>
        <div class="input-group">
          <span class="bi bi-key input-group-text"></span>
          <input type="password" id="txtPwd" class="form-control" placeholder="Enter Password" required>
        </div>

        <button class="btn btn-primary w-100 mt-4" id="btnLogin">
          Sign In <span class="bi bi-arrow-right-short"></span>
        </button>
      </div>

    </div>

  </div>
</body>

</html>
