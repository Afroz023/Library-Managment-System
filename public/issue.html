<!-- ================= ISSUE BOOK SECTION ================= -->
<div class="card shadow-sm border-0 mt-4">

  <!-- Header -->
  <div class="card-header bg-white fw-bold fs-5">
     Issue Book
  </div>

  <!-- Body -->
  <div class="card-body">

    <!-- ========== STUDENT DETAILS ========== -->
    <h6 class="fw-bold mb-3"> Student Details</h6>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <label class="form-label">Roll No</label>
        <input type="number" class="form-control" id="issueRollNo" placeholder="Enter Roll No">
      </div>

      <div class="col-md-4">
        <label class="form-label">Student Name</label>
        <input type="text" class="form-control" id="issueStudentName" placeholder="Student Name" readonly>
      </div>

      <div class="col-md-4">
        <label class="form-label">Course</label>
        <input type="text" class="form-control" id="issueCourse" placeholder="Course" readonly>
      </div>
    </div>

    <hr>

    <!-- ========== BOOK DETAILS ========== -->
    <h6 class="fw-bold mb-3">Book Details</h6>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <label class="form-label">Book ID</label>
        <input type="number" class="form-control" id="issueBookId" placeholder="Enter Book ID">
      </div>

      <div class="col-md-4">
        <label class="form-label">Book Name</label>
        <input type="text" class="form-control" id="issueBookName" placeholder="Book Name" readonly>
      </div>

      <div class="col-md-4">
        <label class="form-label">Available Quantity</label>
        <input type="number" class="form-control" id="bookQty" placeholder="Qty" readonly>
      </div>
    </div>

    <hr>

    <!-- ========== ISSUE DATE (AUTO TODAY) ========== -->
   <h6 class="fw-bold mb-3"> Issue Details</h6>

<div class="row g-3 mb-3">
  <div class="col-md-4">
    <label class="form-label">Issue Date (Auto Today)</label>
    <input type="date" class="form-control" id="issueDate" readonly>
  </div>

  <div class="col-md-4">
    <label class="form-label">Loan Days</label>
    <select class="form-select" id="loanDays">
      <option value="7" selected>7 days</option>
      <option value="14">14 days</option>
      <option value="21">21 days</option>
      <option value="30">30 days</option>
    </select>
  </div>

  <div class="col-md-4">
    <label class="form-label">Due Date (Auto)</label>
    <input type="date" class="form-control" id="dueDate" readonly>
  </div>
</div>


    <!-- Info -->
    <div class="alert alert-info small mt-3">
       A student can issue maximum <strong>3 books</strong> at a time.
    </div>

    <!-- ========== ACTION BUTTONS ========== -->
    <div class="d-flex justify-content-end gap-2 mt-3">
      <button class="btn btn-secondary" id="resetIssueForm">Reset</button>
      <button class="btn btn-success" id="issueBookBtn"> Issue Book</button>
    </div>

  </div>
</div>
<!-- ================= END ISSUE BOOK SECTION ================= -->
